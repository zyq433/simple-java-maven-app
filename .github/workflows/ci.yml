name: Java CI with Maven

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  checkstyle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Run Checkstyle
        run: mvn checkstyle:check -Dcheckstyle.skip=true

  build-and-test:
    runs-on: ubuntu-latest
    needs: checkstyle
    strategy:
      matrix:
        java-version: [21, 22, 23]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven
      - name: Build and test with Maven
        run: mvn -B test --no-transfer-progress
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk${{ matrix.java-version }}
          path: target/surefire-reports/

  package:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Package JAR (skip tests)
        run: mvn -B package -DskipTests --no-transfer-progress
      - name: Verify JAR runs
        run: java -jar target/*.jar
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-jar
          path: target/*.jar

  notify:
    runs-on: ubuntu-latest
    needs: [checkstyle, build-and-test, package]
    if: always()
    steps:
      - run: |
          echo "========================================"
          echo "         CI/CD Pipeline Finished"
          echo "========================================"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"